name: Dependency review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Detect Dependency Graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Dependency Graph is unavailable; using the lockfile audit fallback."
          fi
      - name: Review dependency changes
        if: steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
      - name: Setup Node.js for audit fallback
        if: steps.dependency-graph.outputs.enabled != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.x
      - name: Enable pinned pnpm for audit fallback
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate
      - name: Install frozen lockfile for audit fallback
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: pnpm dependency:audit
