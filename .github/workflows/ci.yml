name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: All package tests
        run: pnpm test

      - name: Core tests
        run: pnpm test:core

      - name: Detection tests
        run: pnpm test:detection

      - name: OpenClaw v3 conformance
        run: pnpm test:openclaw:v3

      - name: OpenClaw v4 conformance
        run: pnpm test:openclaw:v4

      - name: Hermes tests and conformance
        run: pnpm test:hermes

      - name: Shared conformance group
        run: pnpm test:conformance

      - name: Fuzz and property group
        run: pnpm test:fuzz

      - name: Resource resilience group
        run: pnpm test:resilience

      - name: Live harness with fake runtimes
        run: pnpm test:live

      - name: Build
        run: pnpm build

      - name: Live CLI safety tests
        run: pnpm test:live:cli

      - name: Check deterministic API reports
        run: pnpm api:check

      - name: Compile clean packed-package consumer
        run: pnpm consumer:check

      - name: Check package boundaries
        run: pnpm package:check

      - name: Check package contents
        run: pnpm package:contents

      - name: Scan for secrets
        run: pnpm secret:scan

      - name: Security, fixture, workflow, and license checks
        run: pnpm security:check

      - name: Dependency vulnerability audit
        run: pnpm dependency:audit

      - name: Release gate
        run: pnpm release:gate
