name: Manual npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact SDK prerelease version and tag suffix
        required: true
        default: 0.1.0-alpha.1
        type: string
      confirm_publish:
        description: Confirm publication after protected-environment approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: npm-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate and prepare release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate
      - name: Validate requested version and ref
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "$RELEASE_VERSION" = "$(node -p "require('./release.config.json').sdkVersion")"
          test "$GITHUB_REF" = "refs/tags/v$RELEASE_VERSION"
          test -z "$(git status --porcelain)"
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Run complete release gate
        run: pnpm release:gate
      - name: Upload release preparation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-runtime-sdk-${{ inputs.version }}
          path: artifacts/release/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Trusted npm publication
    needs: prepare
    if: ${{ inputs.confirm_publish == true && startsWith(github.ref, 'refs/tags/v') && github.repository == 'bazobazobazo/agent-runtime-sdk' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout approved tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js trusted publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.14.0'
          registry-url: https://registry.npmjs.org
          package-manager-cache: 'false'
      - name: Install supported npm CLI
        run: npm install --global npm@11.5.1
      - name: Verify publication toolchain
        run: |
          node --version
          npm --version
          node -e "
          const actual = process.versions.node.split('.').map(Number);
          const minimum = [22, 14, 0];
          const index = actual.findIndex((part, position) => part !== minimum[position]);
          if (index >= 0 && actual[index] < minimum[index]) process.exit(1);
          "
          node -e "
          const { execFileSync } = require('node:child_process');
          const actual = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim().split('.').map(Number);
          const minimum = [11, 5, 1];
          const index = actual.findIndex((part, position) => part !== minimum[position]);
          if (index >= 0 && actual[index] < minimum[index]) process.exit(1);
          "
      - name: Download validated artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: agent-runtime-sdk-${{ inputs.version }}
          path: artifacts/release
      - name: Revalidate tag, manifest, and confirmation
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "$GITHUB_REF" = "refs/tags/v$RELEASE_VERSION"
          test "$(node -p "require('./artifacts/release/release-manifest.json').sdkVersion")" = "$RELEASE_VERSION"
          test "$(node -p "require('./artifacts/release/release-manifest.json').distTag")" = "next"
          test "$(node -p "require('./artifacts/release/release-manifest.json').publicationStatus")" = "not-published"
      - name: Publish six approved tarballs with provenance
        run: |
          set -euo pipefail
          test "$(find artifacts/release/tarballs -maxdepth 1 -name '*.tgz' | wc -l)" -eq 6
          for tarball in artifacts/release/tarballs/*.tgz; do
            npm publish "$tarball" --access public --tag next --provenance
          done
